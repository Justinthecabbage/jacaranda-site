<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — Jacaranda Music Club</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav>
    <div class="nav-wrap">
        <div class="logo-bar">
            <a href="../index.html"><img src="../clubLogo.png" alt="Club Logo"></a>
            <span>Jacaranda Music Club</span>
        </div>
        <div class="nav-menu">
            <a href="../index.html">Home</a>
            <a href="community.html">Community</a>
            <a href="song-request.html">Song Board</a>
        </div>
    </div>
</nav>

<div class="page-header">
    <h1>Log In</h1>
    <p>Sign in with your verified email account</p>
</div>

<div class="auth-container">
    <div id="alert-box"></div>
    <div class="card">
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Log In</button>
        </form>
        <div class="auth-links">
            Don't have an account? <a href="register.html">Sign Up</a>
        </div>
    </div>
</div>

<footer>
    <p>© 2025 Jacaranda Music Club | Sino-US Curriculum Program of Hefei No.1 High School</p>
</footer>

<script src="../js/config.js"></script>
<script type="module">
    import { initLoginPage } from '../js/auth.js';
    initLoginPage();
</script>
<script type="module" src="../js/agent-widget.js"></script>

</body>
</html>
